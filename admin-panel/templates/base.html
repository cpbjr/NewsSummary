<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NewsSummary Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a1a2e',
                        secondary: '#0f3460',
                        accent: '#e94560'
                    }
                }
            }
        }
    </script>
    <style>
        .nav-link.active {
            background-color: #e94560;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    {% if session.get('authenticated') %}
    <!-- Navigation -->
    <nav class="bg-primary text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <h1 class="text-xl font-bold">NewsSummary Admin</h1>
                    <div class="hidden md:flex space-x-4">
                        <a href="/" class="nav-link px-3 py-2 rounded hover:bg-secondary transition">Dashboard</a>
                        <a href="/feeds" class="nav-link px-3 py-2 rounded hover:bg-secondary transition">RSS Feeds</a>
                        <a href="/delivery" class="nav-link px-3 py-2 rounded hover:bg-secondary transition">Delivery</a>
                        <a href="/keywords" class="nav-link px-3 py-2 rounded hover:bg-secondary transition">Keywords</a>
                        <a href="/preview" class="nav-link px-3 py-2 rounded hover:bg-secondary transition">Preview</a>
                    </div>
                </div>
                <div>
                    <a href="/logout" class="px-4 py-2 bg-accent rounded hover:bg-red-600 transition">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Notifications -->
    <div id="toast" class="fixed top-4 right-4 hidden">
        <div class="bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg">
            <p id="toast-message"></p>
        </div>
    </div>

    <script>
        // Toast notification function
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const toastDiv = toast.querySelector('div');

            toastMessage.textContent = message;
            toastDiv.className = `px-6 py-3 rounded-lg shadow-lg ${
                type === 'success' ? 'bg-green-500' : 'bg-red-500'
            } text-white`;

            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // Highlight active nav link
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
